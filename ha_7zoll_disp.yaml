###  -----------------------------        60% um 7 Button          -----------------------------
###  -------------------------------------------------------------------------------------------
        # Schedules charging to reach 60 % by 07:00.
        # If a plan is already active, pressing the button deletes it instead.
        - button:
            x: 100
            y: 260
            width: 140
            height: 140
            checkable: true
            id: charge_60perc_7
            bg_color: 0x00c0ff
            border_color: 0x005d7f
            border_width: 5
            #bg_opa: TRANSP
            checked:
              bg_color: 0x00AA00
              border_color: 0x00AA00
              bg_opa: COVER
            widgets:
              - label:
                  id: charge_60perc_7_icon
                  align: CENTER
                  y: -15
                  text_font: icons_100
                  text: "\U000F05F1"   # mdi-ev-station
              - label:
                  text: "60% bis 7:00"
                  align: CENTER
                  y: 45
                  text_font: montserrat_18
            on_short_click:
              - if:
                  condition:
                    lambda: 'return id(evcc_ladeplan_aktiv).state;'
                  then:
                    - homeassistant.action:
                        action: script.evcc_ladeplan_loeschen   # plan active → delete it
                  else:
                    - homeassistant.action:
                        action: script.evcc_ladeplan_morgen     # no plan → create one

