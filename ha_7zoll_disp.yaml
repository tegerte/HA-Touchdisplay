        # Analog thermometer: two overlaid scales.
        # Scale 1 (range -100..400): drives the needle (value = °C × 10).
        # Scale 2 (range -10..40):   renders the human-readable tick labels.
        - meter:
            align: TOP_MID
            x: -100
            y: 45
            height: 216
            width: 216
