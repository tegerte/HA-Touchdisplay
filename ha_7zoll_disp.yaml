#######################################################################
#  ESPHome config for Makerfabs MaTouch ESP32-S3 7" display
#  Hardware: ESP32-S3, 16MB flash, octal PSRAM, 1024x600 RGB display,
#            GT911 touchscreen, LEDC backlight on GPIO10
#######################################################################
substitutions:
  graph_server_ip: "192.168.1.145"   # ← IP des Homeservers (Python-Bildserver Port 8765)

esphome:
  name: matouch-esp32s3-7
  friendly_name: Matouch_ESP32S3_7
  on_boot:
    priority: -100       # after LVGL init so widgets already exist
    then:
      - lvgl.label.update:
          id: lbl_pv_start_soc
          text: "PV-Start, SoC: --"

######################################################################
#  ESP32-S3 chip & framework
######################################################################
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"   # 240 MHz CPU
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y         # execute code from PSRAM
      CONFIG_SPIRAM_RODATA: y                     # read-only data in PSRAM
      CONFIG_COMPILER_OPTIMIZATION_PERF: y
      CONFIG_FREERTOS_UNICORE: n                  # dual-core enabled
      CONFIG_FREERTOS_TIMER_TASK_STACK_DEPTH: "4096"
      CONFIG_FREERTOS_TASK_NOTIFICATION_ARRAY_ENTRIES: "3"
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: y

# external_components:
#   - source:
#       type: local
#       path: common_components
#     components: [rgb565]
#     refresh: never

#######################################################################
#  PSRAM – octal mode required for the S3 variant on this board
#######################################################################
psram:
  mode: octal
  speed: 80MHz

#######################################################################
#  Connectivity
#######################################################################
# Enable logging

logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "5DQ0UsfBrLmofn2GjgWwrlGGbaa81g22Y+dfiQYff3I="

ota:
  - platform: esphome
    password: "f92b6f28ac0f9f6471d5c881d1ea594d"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot when WiFi connection fails
  ap:
    ssid: "matouch_esp32s3_7"
    password: "F03ZsTI6ltRE"

captive_portal:

#######################################################################
#  I2C – used by the GT911 touchscreen controller
#######################################################################
i2c:
  - id: touch_i2c
    sda: GPIO17
    scl: GPIO18
    scan: true

#######################################################################
#  Display – parallel RGB interface, 1024x600
#######################################################################
display:
  - platform: rpi_dpi_rgb
    id: rgb_display
    color_order: RGB
    pclk_frequency: 16MHz
    dimensions:
      width: 1024
      height: 600
    # Sync / enable pins
    de_pin: 40
    hsync_pin: 39
    vsync_pin: 41
    pclk_pin: 42
    # Horizontal timing (pixels)
    hsync_back_porch: 128
    hsync_front_porch: 40
    hsync_pulse_width: 48
    # Vertical timing (lines)
    vsync_back_porch: 45
    vsync_front_porch: 13
    vsync_pulse_width: 3
    # RGB565 data pins (5 red, 6 green, 5 blue)
    data_pins:
      red:
        - 45        #r1
        - 48        #r2
        - 47        #r3
        - 21        #r4
        - 14        #r5
      green:
        - 5         #g0
        - 6         #g1
        - 7         #g2
        - 15        #g3
        - 16        #g4
        - 4         #g5
      blue:
        - 8         #b1
        - 3         #b2
        - 46        #b3
        - 9         #b4
        - 1         #b5

#######################################################################
#  Touchscreen – GT911 capacitive controller
#######################################################################
touchscreen:
  - platform: gt911
    display: rgb_display
    id: touch_screen
    update_interval: 16ms   # ~60 Hz polling
    i2c_id: touch_i2c
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
# Uncomment to wake display on touch when LVGL is paused:
#    on_release:
#      - if:
#          condition: lvgl.is_paused
#          then:
#            - logger.log: "LVGL resuming"
#            - lvgl.resume:
#            - lvgl.widget.redraw:
#            - light.turn_on: display_backlight

# Backlight light entity (disabled – brightness controlled via lcd_pwm_output directly):
#light:
#  - platform: monochromatic
#    id: display_backlight
#    #output: backlight
#    #name: backlight
#    restore_mode: ALWAYS_ON

# binary_sensor:
#   - platform: status
#     name: Status sensor

#######################################################################
#  Fonts
#######################################################################
font:
  # General-purpose text font
  - file: "gfonts://Roboto"
    id: large_font
    size: 32
    bpp: 4

  # Material Design Icons – only include the codepoints actually used
  # to keep flash usage low. Add new codepoints here before referencing them.
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_100
    size: 100
    bpp: 4
    glyphs: [
      "\U000F0594", # clear-night
      "\U000F0590", # cloudy
      "\U000F0F2F", # exceptional
      "\U000F0591", # fog
      "\U000F0592", # hail
      "\U000F0593", # lightning
      "\U000F067E", # lightning-rainy
      "\U000F0595", # partlycloudy
      "\U000F0596", # pouring
      "\U000F0597", # rainy
      "\U000F0598", # snowy
      "\U000F067F", # snowy-rainy
      "\U000F0599", # sunny
      "\U000F059D", # windy
      "\U000F059E", # windy-variant
      "\U000F14E4", # sunny-off
      "\U000F0335", # mdi-lightbulb
      "\U000F0336", # mdi-lightbulb-outline
      "\U000F05F1", # mdi-ev-station
      "\U000F0A72", # solar-power
      ]

  # Smaller MDI icons for bar labels and info labels on main_page
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_30
    size: 30
    bpp: 4
    glyphs: [
      "\U000F010B", # mdi-car (Mercedes)
      "\U000F0A72", # mdi-solar-power (PV)
      "\U000F0079", # mdi-battery (Hausbatterie)
      "\U000F059C", # mdi-weather-sunset-down (Sonnenuntergang)
      "\U000F05F1", # mdi-ev-plug (Ladeleistung)
    ]

  # Tiny MDI icons for info-table rows
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_20
    size: 20
    bpp: 4
    glyphs: [
      "\U000F0A72", # mdi-solar-power      (PV heute, PV verbl., Solar %)
      "\U000F059C", # mdi-weather-sunset-down (Sonnenuntergang)
      "\U000F03B4", # mdi-percent           (Autarkie)
      "\U000F08F3", # mdi-road-variant      (Reichweite)
      "\U000F024D", # mdi-clock-outline     (Ladeende, Abfahrtzeit)
      "\U000F0085", # mdi-battery-charging  (SOC Soll, Nachgeladen)
      "\U000F01B5", # mdi-currency-eur      (Kosten)
    ]

#######################################################################
#  Global variables (persisted across reboots)
#######################################################################
globals:
  - id: brightness_global
    type: float
    restore_value: yes
    initial_value: '80'   # default 80 %
  - id: youliang
    type: int
    initial_value: '60'
    restore_value: yes

#######################################################################
#  Backlight PWM output
#  inverted=true because the hardware drives the gate low to turn on
#######################################################################
output:
  - platform: ledc
    id: lcd_pwm_output
    pin: GPIO10
    # frequency: 20000hz
    min_power: 0.07   # keep backlight dim but never fully off
    inverted: true

#######################################################################
#  Online image – temperature graph fetched from home server
#  Python server on home server listens on port 8765:
#    GET /temp_graph.jpg  → serves latest JPEG
#    POST /save           → receives new JPEG from HA automation
#######################################################################
http_request:
  verify_ssl: false

online_image:
  - url: "http://${graph_server_ip}:8765/temp_graph.jpg"
    id: temp_graph_img
    format: JPEG
    type: RGB565
    update_interval: 2min
    on_download_finished:
      - lvgl.image.update:
          id: temp_graph_widget
          src: temp_graph_img

#######################################################################
#  Home Assistant sensors
#######################################################################
sensor:
  # Raw outdoor temperature – unused directly, kept for lambda access
  - platform: homeassistant
    id: temp_aussen
    entity_id: sensor.lufttemperatur_aussen
    internal: true

  # Outdoor temperature → drives the meter needle and text label
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: sensor.lufttemperatur_aussen
    on_value:
        - lvgl.indicator.update:
            id: temperature_needle
            value: !lambda return x * 10;  # needle scale is -100..400 = -10..40°C
        - lvgl.label.update:
            id: temperature_text
            text:
              format: "%.1f°C"
              args: [ 'x' ]

  # Hausbatterie SoC → shown on the PV-Start button and drives bar on main_page
  - platform: homeassistant
    id: battery_soc
    entity_id: sensor.evcc_battery_soc
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pv_start_soc
            text: !lambda |-
              char buf[24];
              snprintf(buf, sizeof(buf), "PV-Start, SoC: %d%%", (int)x);
              return std::string(buf);
        - lambda: |-
            int fill_h = (int)(x * 4.5f);
            if (fill_h < 0) fill_h = 0;
            if (fill_h > 450) fill_h = 450;
            lv_obj_set_size(id(fill_hausbatt), 44, fill_h);
            lv_obj_set_pos(id(fill_hausbatt), 0, 450 - fill_h);
        - lvgl.label.update:
            id: lbl_bar_hausbatt
            text: !lambda |-
              char buf[8];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return std::string(buf);

  # Mercedes Reichweite → drives vertical bar on main_page (max 400 km)
  - platform: homeassistant
    id: mercedes_range
    entity_id: sensor.cw_mt_891_e_range_electric
    internal: true
    on_value:
      then:
        - lambda: |-
            int fill_h = (int)(x / 400.0f * 450.0f);
            if (fill_h < 0) fill_h = 0;
            if (fill_h > 450) fill_h = 450;
            lv_obj_set_size(id(fill_mercedes), 44, fill_h);
            lv_obj_set_pos(id(fill_mercedes), 0, 450 - fill_h);
        - lvgl.label.update:
            id: lbl_bar_mercedes
            text: !lambda |-
              char buf[10];
              snprintf(buf, sizeof(buf), "%d km", (int)x);
              return std::string(buf);

  # PV Tagesrestenergie → Info-Label auf main_page
  - platform: homeassistant
    id: pv_tagesrestenergie
    entity_id: sensor.pv_verbleibende_energie_heute
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pv_restenergie
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f kWh", x);
              return std::string(buf);

  # PV-Leistung → drives vertical bar on main_page (100% = 10 kW; entity reports W)
  - platform: homeassistant
    id: pv_power
    entity_id: sensor.evcc_pv_power
    internal: true
    on_value:
      then:
        - lambda: |-
            float pct = x / 100.0f;
            if (pct < 0.0f) pct = 0.0f;
            if (pct > 100.0f) pct = 100.0f;
            int fill_h = (int)(pct * 4.5f);
            lv_obj_set_size(id(fill_pv), 44, fill_h);
            lv_obj_set_pos(id(fill_pv), 0, 450 - fill_h);
        - lvgl.label.update:
            id: lbl_bar_pv
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%d W", (int)x);
              return std::string(buf);

  # EV Ladeleistung → drives vertical bar on main_page (max 11 kW; entity reports W)
  - platform: homeassistant
    id: ev_charge_power
    entity_id: sensor.evcc_e_auto_laden_charge_power
    internal: true
    on_value:
      then:
        - lambda: |-
            int fill_h = (int)(x / 11.0f * 450.0f);
            if (fill_h < 0) fill_h = 0;
            if (fill_h > 450) fill_h = 450;
            lv_obj_set_size(id(fill_ev_charge), 44, fill_h);
            lv_obj_set_pos(id(fill_ev_charge), 0, 450 - fill_h);
        - lvgl.label.update:
            id: lbl_bar_ev_charge
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f kW", x);
              return std::string(buf);

#######################################################################
#  Home Assistant binary sensors
#######################################################################
binary_sensor:
  # Charging schedule active flag → reflects checked state of the schedule button
  - platform: homeassistant
    id: evcc_ladeplan_aktiv
    entity_id: input_boolean.evcc_ladeplan_aktiv
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: charge_60perc_7
            state:
              checked: !lambda 'return x;'

#######################################################################
#  Home Assistant text sensors
#######################################################################
text_sensor:
  # Office light state → toggles button checked/disabled and swaps icon
  - platform: homeassistant
    id: ts_remote_light
    entity_id: light.remote_light
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_lightbulb
            state:
              checked: !lambda return (0 == x.compare(std::string{"on"}));
              disabled: !lambda return ((0 == x.compare(std::string{"unavailable"})) or (0 == x.compare(std::string{"unknown"})));
        - lvgl.label.update:
            id: lbl_lightbulb
            text: !lambda |-
              static char buf[10];
              std::string icon;
              if (0 == x.compare(std::string{"on"})) {
                  icon = "\U000F0335";   // mdi-lightbulb (filled)
              } else {
                  icon = "\U000F0336";   // mdi-lightbulb-outline
              }
              snprintf(buf, sizeof(buf), "%s", icon.c_str());
              return buf;

  # Zeit bis Sonnenuntergang → Info-Label auf main_page
  - platform: homeassistant
    id: zeit_bis_sonnenuntergang
    entity_id: sensor.zeit_bis_sonnenuntergang
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sonnenuntergang
            text: !lambda return x;

  # EVCC charging mode → Charge page + Info-Tabelle
  - platform: homeassistant
    id: evcc_mode
    entity_id: sensor.evcc_e_auto_laden_mode
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pv_start_mode
            text: !lambda return x;

  # --- Info-Tabelle: weitere HA-Sensoren ---
  - platform: homeassistant
    id: ts_daily_pv_energy
    entity_id: sensor.daily_pv_energy
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_daily_pv_energy
            text: !lambda return x + " kWh";

  - platform: homeassistant
    id: ts_autarkie
    entity_id: sensor.daily_self_suff_rate
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_autarkie
            text: !lambda return x + " %";

  - platform: homeassistant
    id: ts_solar_pct
    entity_id: sensor.evcc_stat_total_solar_percentage
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_solar_pct
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f %%", atof(x.c_str()));
              return std::string(buf);

  - platform: homeassistant
    id: ts_range_electric
    entity_id: sensor.cw_mt_891_e_range_electric
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_range_electric
            text: !lambda return x + " km";

  - platform: homeassistant
    id: ts_plan_end
    entity_id: sensor.evcc_e_auto_laden_plan_projected_end
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_plan_end
            text: !lambda return x;

  - platform: homeassistant
    id: ts_plan_soc
    entity_id: sensor.evcc_e_auto_laden_effective_plan_soc
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_plan_soc
            text: !lambda return x + " %";

  - platform: homeassistant
    id: ts_departure
    entity_id: sensor.cw_mt_891_e_departure_time
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_departure
            text: !lambda return x;

  - platform: homeassistant
    id: ts_energy_cost
    entity_id: sensor.nachgeladen_energie_kosten
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_energy_cost
            text: !lambda return x + " \u20AC";

  - platform: homeassistant
    id: ts_sess_range
    entity_id: sensor.nachgeladene_reichweite
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sess_range
            text: !lambda return x + " km";

  - platform: homeassistant
    id: ts_sess_price
    entity_id: sensor.evcc_e_auto_laden_session_price
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sess_price
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f \u20AC", atof(x.c_str()));
              return std::string(buf);

  - platform: homeassistant
    id: ts_charged_energy
    entity_id: sensor.evcc_e_auto_laden_charged_energy
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_charged_energy
            text: !lambda return x + " kWh";

