#######################################################################
#  LVGL – UI definition
#######################################################################
lvgl:
  # --- Global theme applied to every widget of each type ---
  theme:
    label:
      text_font: montserrat_18
    button:
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_color: 0x0077b3
      border_width: 1
      text_color: 0xFFFFFF
      pressed:
        bg_color: 0x006699
        bg_grad_color: 0x00334d
      checked:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        text_color: 0xfff300
    buttonmatrix:
      bg_opa: TRANSP
      border_color: 0x0077b3
      border_width: 0
      text_color: 0xFFFFFF
      pad_all: 0
      items:
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF
        text_font: montserrat_18
        pressed:
          bg_color: 0x006699
          bg_grad_color: 0x00334d
        checked:
          bg_color: 0x1d5f96
          bg_grad_color: 0x03324A
          text_color: 0x005580
    switch:
      bg_color: 0xC0C0C0
      bg_grad_color: 0xb0b0b0
      bg_grad_dir: VER
      bg_opa: COVER
      checked:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        bg_grad_dir: VER
        bg_opa: COVER
      knob:
        bg_color: 0xFFFFFF
        bg_grad_color: 0xC0C0C0
        bg_grad_dir: VER
        bg_opa: COVER
    slider:
      border_width: 1
      border_opa: 15%
      bg_color: 0xcccaca
      bg_opa: 15%
      indicator:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        bg_grad_dir: VER
        bg_opa: COVER
      knob:
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF

  # --- Reusable style for page header bars and the bottom nav bar ---
  style_definitions:
      - id: header_footer
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_opa: TRANSP
        radius: 0
        pad_all: 0
        pad_row: 0
        pad_column: 0
        border_color: 0x0077b3
        text_color: 0xFFFFFF
        width: 100%
        height: 30

  # --- Persistent overlay: bottom navigation bar (always visible) ---
  top_layer:
    widgets:
      - buttonmatrix:
          align: bottom_mid
          styles: header_footer
          pad_all: 0
          outline_width: 0
          id: top_layer
          items:
            styles: header_footer
          rows:
            - buttons:
                - id: page_prev
                  text: "Automationen"
                  on_press:
                    then:
                      lvgl.page.previous:
                - id: page_home
                  text: "\uF015"   # home icon
                  on_press:
                    then:
                      lvgl.page.show: main_page
                - id: page_next
                  text: "Laden"
                  on_press:
                    then:
                      lvgl.page.next:

# Uncomment to auto-pause LVGL after idle timeout:
#  on_idle:
#    timeout: !lambda "return (id(display_timeout).state * 1000);"
#    then:
#      - logger.log: "LVGL is idle"
#      - light.turn_off: display_backlight
#      - lvgl.pause:

  pages:
    ###################################################################
    #  Page 1 – Hauptseite: outdoor temperature meter
    ###################################################################
    - id: main_page
      widgets:
        # Page header bar
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "Hauptseite"
                  align: CENTER
                  text_align: CENTER
                  text_color: 0xFFFFFF

# Disabled plain text label – replaced by the meter widget below:
#        - label:
#            id: temp_label
#            x: 50
#            y: 50
#            width: 400
#            height: 80
#            text: "---"
#            text_font: montserrat_18
#        - button:
#            x: 110
#            y: 40
#            width: 90
#            height: 50
#            checkable: true
#            id: btn_lightbulb
#            widgets:
#              - label:
#                  id: lbl_lightbulb
#                  align: CENTER
#                  text_font: icons_100
#                  text: "\U000F0336" # mdi-lightbulb-outline
#            on_short_click:
#              - homeassistant.action:
#                  action: light.toggle
#                  data:
#                    entity_id: light.buerolicht

        # Analog thermometer: two overlaid scales.
        # Scale 1 (range -100..400): drives the needle (value = °C × 10).
        # Scale 2 (range -10..40):   renders the human-readable tick labels.
        - meter:
            align: CENTER
            height: 180
            width: 180
            scales:
              - range_from: -100   # needle scale: -100..400 maps to -10..40°C
                range_to: 400
                angle_range: 240
                rotation: 150
                indicators:
                  - line:
                      id: temperature_needle
                      width: 2
                      color: 0xFF0000
                      r_mod: -4
                  - tick_style:
                      start_value: -10
                      end_value: 40
                      color_start: 0x0000bd   # blue = cold
                      color_end: 0xbd0000     # red  = hot
                      width: 1
              - range_from: -10   # label scale: matches real °C values
                range_to: 40
                angle_range: 240
                rotation: 150
                ticks:
                  width: 1
                  count: 51       # one tick per degree
                  length: 10
                  color: 0x000000
                  major:
                    stride: 5     # major tick every 5°C
                    width: 2
                    length: 10
                    color: 0x404040
                    label_gap: 10
            widgets:
              - label:
                  id: temperature_text
                  text: "-.-°C"
                  align: CENTER
                  y: 45
              - label:
                  text: "Outdoor"
                  align: CENTER
                  y: 65

    ###################################################################
    #  Page 2 – Licht: office light toggle
    ###################################################################
    - id: Licht
      widgets:
        # Page header bar
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "Licht"
                  align: CENTER
                  text_align: CENTER
                  text_color: 0xFFFFFF

        # Toggle button for office light; icon and checked state updated
        # by ts_remote_light text sensor
        - button:
            x: 100
            y: 100
            width: 120
            height: 120
            checkable: true
            id: btn_lightbulb
            widgets:
              - label:
                  id: lbl_lightbulb
                  align: CENTER
                  y: -15
                  text_font: icons_100
                  text: "\U000F0336" # mdi-lightbulb-outline (default)
              - label:
                  text: "Buerolicht"
                  align: CENTER
                  y: 45
                  text_font: montserrat_18
            on_short_click:
              - homeassistant.action:
                  action: light.toggle
                  data:
                    entity_id: light.buerolicht

    ###################################################################
    #  Page 3 – Charge: EV charging controls
    ###################################################################
    - id: Charge
      widgets:
        # Page header bar
        - obj:
            align: TOP_MID
            styles: header_footer
            widgets:
              - label:
                  text: "Charge"
                  align: CENTER
                  text_align: CENTER
                  text_color: 0xFFFFFF

###  -------------------------------------------------------------------------------------------
###  -----------------------------        STARTE PV-LADEN Button    -----------------------------
###  -------------------------------------------------------------------------------------------
        # Activates PV surplus charging via evcc script.
        # Label shows live battery SoC; turns green when checked.
        - button:
            x: 100
            y: 100
            width: 140
            height: 140
            checkable: true
            id: charge_PV_Start
            bg_color: 0x00c0ff
            border_color: 0x005d7f
            border_width: 5
            checked:
              bg_color: 0x00AA00
              border_color: 0x00AA00
              bg_opa: COVER
            widgets:
              - label:
                  id: charge_pv_start_icon
                  align: CENTER
                  y: -15
                  text_font: icons_100
                  text: "\U000F0A72"           # mdi-solar-power
#              - label:
#                  text: "PV-Start"
#                  align: CENTER
#                  y: 40
#                  text_font: montserrat_18
              - label:
                  id: lbl_pv_start_soc
                  align: CENTER
                  y: 40
                  text_font: montserrat_18
                  text_color: 0xCCCCCC
                  text: "SoC: --%"
            on_short_click:
              - homeassistant.action:
                  action: script.evcc_minpv_aktivieren

        # Current EVCC mode label shown below the PV-Start button
        - label:
            id: lbl_pv_start_mode
            x: 100
            y: 250
            width: 140
            text_align: CENTER
            text: "Modus: --"
            text_font: montserrat_14
            text_color: 0x7A8FA6

###  -------------------------------------------------------------------------------------------
###  -----------------------------        60% um 7 Button          -----------------------------
###  -------------------------------------------------------------------------------------------
        # Schedules charging to reach 60 % by 07:00.
        # If a plan is already active, pressing the button deletes it instead.
        - button:
            x: 100
            y: 260
            width: 140
            height: 140
            checkable: true
            id: charge_60perc_7
            bg_color: 0x00c0ff
            border_color: 0x005d7f
            border_width: 5
            #bg_opa: TRANSP
            checked:
              bg_color: 0x00AA00
              border_color: 0x00AA00
              bg_opa: COVER
            widgets:
              - label:
                  id: charge_60perc_7_icon
                  align: CENTER
                  y: -15
                  text_font: icons_100
                  text: "\U000F05F1"   # mdi-ev-station
              - label:
                  text: "60% bis 7:00"
                  align: CENTER
                  y: 45
                  text_font: montserrat_18
            on_short_click:
              - if:
                  condition:
                    lambda: 'return id(evcc_ladeplan_aktiv).state;'
                  then:
                    - homeassistant.action:
                        action: script.evcc_ladeplan_loeschen   # plan active → delete it
                  else:
                    - homeassistant.action:
                        action: script.evcc_ladeplan_morgen     # no plan → create one


