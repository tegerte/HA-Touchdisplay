    pin: GPIO10
    # frequency: 20000hz
    min_power: 0.07
    inverted: true
#######################################################################
#                                 HA Sensor
#######################################################################
sensor:
  - platform: homeassistant
    id: temp_aussen
    entity_id: sensor.lufttemperatur_aussen
    internal: true
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: sensor.lufttemperatur_aussen
    on_value:
        - lvgl.indicator.update:
            id: temperature_needle
            value: !lambda return x * 10;
        - lvgl.label.update:
            id: temperature_text
            text:
              format: "%.1f°C"
              args: [ 'x' ]
#binary_sensor:
